workflows:
  android-apk:
    name: Global Exchanger Android APK - QR Production
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Unzip, patch production app, and Build APK
        script: |
          set -e
          unzip -o global_exchanger_project.zip -d project
          cd project/global_exchanger_flutter

          python3 - <<'PY'
          from pathlib import Path

          pubspec = Path('pubspec.yaml')
          text = pubspec.read_text()
          text = '\n'.join([line for line in text.splitlines() if 'razorpay_flutter:' not in line]) + '\n'
          pubspec.write_text(text)

          main = Path('lib/main.dart')
          m = main.read_text()
          m = m.replace("import 'package:razorpay_flutter/razorpay_flutter.dart';\n", "")
          m = m.replace("ListView(children: const [", "ListView(children: [")
          m = m.replace("child: const ListView(children: [", "child: ListView(children: [")
          m = m.replace("color: Color(0xFF111827)", "color: const Color(0xFF111827)")
          main.write_text(m)

          api = Path('lib/services/api_service.dart')
          a = api.read_text()
          a = a.replace("static const String baseUrl = 'http://10.0.2.2:5000';", "static const String baseUrl = 'https://global-exchanger.onrender.com';")
          a = a.replace("static const String baseUrl = 'http://localhost:5000';", "static const String baseUrl = 'https://global-exchanger.onrender.com';")
          api.write_text(a)

          service = Path('lib/services/razorpay_checkout_service.dart')
          service.write_text('class PaymentSuccessResponse {final String? orderId;final String? paymentId;final String? signature;PaymentSuccessResponse({this.orderId,this.paymentId,this.signature});} class PaymentFailureResponse {final int? code;final String? message;PaymentFailureResponse({this.code,this.message});} class ExternalWalletResponse {final String? walletName;ExternalWalletResponse({this.walletName});} class RazorpayCheckoutService {Function(PaymentSuccessResponse)? onSuccess;Function(PaymentFailureResponse)? onFailure;Function(ExternalWalletResponse)? onExternalWallet; void openCheckout({required String key,required String orderId,required num amount,required String currency,required String name,required String description,String? userEmail,String? userPhone,}) {onFailure?.call(PaymentFailureResponse(code:0,message:"Payment gateway is currently in testing mode."));} void dispose() {}}')
          PY

          flutter create --platforms=android .

          python3 - <<'PY'
          from pathlib import Path
          import re
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text()
          if 'android.permission.INTERNET' not in text:
              text = text.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">', '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>')
          manifest.write_text(text)

          gradle = Path('android/app/build.gradle.kts') if Path('android/app/build.gradle.kts').exists() else Path('android/app/build.gradle')
          if gradle.exists():
              g = gradle.read_text()
              # Remove kotlin-android plugin AGP9
              g = re.sub(r'\s*id\s*\(\s*["\']kotlin-android["\']\s*\)', '', g)
              g = re.sub(r'\s*kotlin\s*\(\s*["\']android["\']\s*\)', '', g)
              g = re.sub(r'id\s*\(\s*["\']org\.jetbrains\.kotlin\.android["\']\s*\)', '', g)
              # SDK 36
              g = g.replace('compileSdk = flutter.compileSdkVersion', 'compileSdk = 36')
              g = re.sub(r'compileSdk\s*=\s*flutter\.compileSdkVersion', 'compileSdk = 36', g)
              g = re.sub(r'compileSdkVersion\s+[0-9]+', 'compileSdkVersion 36', g)
              g = re.sub(r'targetSdk\s*=\s*flutter\.targetSdkVersion', 'targetSdk = 36', g)
              g = re.sub(r'targetSdkVersion\s+[0-9]+', 'targetSdkVersion 36', g)
              g = g.replace('minSdk = flutter.minSdkVersion', 'minSdk = 23')
              g = re.sub(r'minSdk\s*=\s*flutter\.minSdkVersion', 'minSdk = 23', g)
              # Java 17
              g = g.replace('JavaVersion.VERSION_1_8', 'JavaVersion.VERSION_17').replace('JavaVersion.VERSION_11', 'JavaVersion.VERSION_17').replace('JavaVersion.VERSION_21', 'JavaVersion.VERSION_17')
              g = re.sub(r'jvmTarget\s*=\s*["\'](?:1\.8|11)["\']', 'jvmTarget = "17"', g)
              g = re.sub(r'jvmTarget\s*=\s*JavaVersion\.VERSION_[0-9_]+(?:\.toString\(\))?', 'jvmTarget = "17"', g)
              # Remove kotlinOptions
              g = re.sub(r'\s*kotlinOptions\s*\{[^}]*\}', '', g, flags=re.DOTALL)
              # compileOptions desugaring
              if 'compileOptions {' in g:
                  if 'isCoreLibraryDesugaringEnabled' not in g:
                      g = g.replace('compileOptions {', 'compileOptions {\n        isCoreLibraryDesugaringEnabled = true', 1)
              else:
                  g = re.sub(r'(compileSdk\s*=\s*36)', r'\1\n\n    compileOptions {\n        sourceCompatibility = JavaVersion.VERSION_17\n        targetCompatibility = JavaVersion.VERSION_17\n        isCoreLibraryDesugaringEnabled = true\n    }', g, count=1)
              # coreLibraryDesugaring dep - first try normal place
              if 'coreLibraryDesugaring(' not in g and 'dependencies {' in g:
                  g = g.replace('dependencies {', 'dependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")', 1)
              # Disable R8 minify - Kotlin DSL correct
              g = re.sub(r'isMinifyEnabled\s*=\s*true', 'isMinifyEnabled = false', g)
              g = g.replace('minifyEnabled false', 'isMinifyEnabled = false')
              g = g.replace('minifyEnabled true', 'isMinifyEnabled = false')
              g = re.sub(r'isShrinkResources\s*=\s*true', 'isShrinkResources = false', g)
              g = g.replace('shrinkResources false', 'isShrinkResources = false')
              # Inject into release block
              if 'buildTypes' in g:
                  if 'getByName("release")' in g and 'isMinifyEnabled' not in g.split('getByName("release")',1)[1].split('}',1)[0]:
                      g = g.replace('getByName("release") {', 'getByName("release") {\n            isMinifyEnabled = false\n            isShrinkResources = false\n', 1)
                  if 'release {' in g and 'isMinifyEnabled = false' not in g:
                      g = g.replace('release {', 'release {\n            isMinifyEnabled = false\n            isShrinkResources = false\n', 1)
              # Final cleanup groovy -> kotlin
              g = g.replace('minifyEnabled false', 'isMinifyEnabled = false')
              g = g.replace('shrinkResources false', 'isShrinkResources = false')
              # AGP 9 kotlin compilerOptions
              if 'kotlin {' not in g or 'compilerOptions' not in g:
                  g += "\n\nkotlin {\n    compilerOptions {\n        jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17)\n    }\n}\n"
              gradle_path.write_text(g) if False else Path(gradle).write_text(g)
              # FORCE append desugar dependency at END - guarantees config not empty
              with open(gradle, 'a') as f:
                  f.write("\n\n// Force desugar dependency - Global Exchanger QR fix\ndependencies {\n    coreLibraryDesugaring(\"com.android.tools:desugar_jdk_libs:2.0.4\")\n}\n")
              # ProGuard keep
              Path('android/app/proguard-rules.pro').write_text("-keep class com.google.mlkit.** { *; }\n-dontwarn com.google.mlkit.**\n-keep class com.google.android.gms.** { *; }\n-dontwarn com.google.android.gms.**\n-keep class net.touchcapture.qr.** { *; }\n-keepattributes *Annotation*,Signature,Exceptions\n")
          PY

          flutter clean
          flutter pub get

          # Patch qr_code_scanner
          python3 - <<'PY'
          from pathlib import Path
          import glob, re
          files = glob.glob(str(Path.home() / '.pub-cache/hosted/pub.dev/qr_code_scanner-*/android/build.gradle')) + glob.glob(str(Path.home() / '.pub-cache/hosted/pub.dev/qr_code_scanner-*/**/build.gradle'), recursive=True)
          for fp in set(files):
              p=Path(fp)
              try: txt=p.read_text()
              except: continue
              orig=txt
              if 'android {' in txt and 'namespace ' not in txt:
                  txt=txt.replace('android {','android {\n    namespace "net.touchcapture.qr.flutterqr"',1)
              txt=re.sub(r'compileSdkVersion\s+\d+','compileSdkVersion 36',txt)
              txt=re.sub(r'targetSdkVersion\s+\d+','targetSdkVersion 36',txt)
              txt=txt.replace('JavaVersion.VERSION_1_8','JavaVersion.VERSION_17').replace('JavaVersion.VERSION_11','JavaVersion.VERSION_17')
              txt=re.sub(r'jvmTarget\s*=\s*["\']?(?:1\.8|11|17)["\']?','jvmTarget = "17"',txt)
              if txt!=orig: p.write_text(txt)
          PY

          flutter build apk --release --no-shrink
    artifacts:
      - project/global_exchanger_flutter/build/app/outputs/flutter-apk/app-release.apk