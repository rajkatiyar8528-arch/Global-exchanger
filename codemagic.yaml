workflows:
  android-apk:
    name: Global Exchanger Android APK - QR Production
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Unzip, patch production app, and Build APK
        script: |
          set -e
          unzip -o global_exchanger_project.zip -d project
          cd project/global_exchanger_flutter

          python3 - <<'PY'
          from pathlib import Path

          pubspec = Path('pubspec.yaml')
          text = pubspec.read_text()
          text = '\n'.join([line for line in text.splitlines() if 'razorpay_flutter:' not in line]) + '\n'
          pubspec.write_text(text)

          main = Path('lib/main.dart')
          m = main.read_text()
          m = m.replace("import 'package:razorpay_flutter/razorpay_flutter.dart';\n", "")
          m = m.replace("ListView(children: const [", "ListView(children: [")
          m = m.replace("child: const ListView(children: [", "child: ListView(children: [")
          m = m.replace("color: Color(0xFF111827)", "color: const Color(0xFF111827)")
          main.write_text(m)

          api = Path('lib/services/api_service.dart')
          a = api.read_text()
          a = a.replace("static const String baseUrl = 'http://10.0.2.2:5000';", "static const String baseUrl = 'https://global-exchanger.onrender.com';")
          a = a.replace("static const String baseUrl = 'http://localhost:5000';", "static const String baseUrl = 'https://global-exchanger.onrender.com';")
          api.write_text(a)

          service = Path('lib/services/razorpay_checkout_service.dart')
          service.write_text(r'''
          class PaymentSuccessResponse {
            final String? orderId;
            final String? paymentId;
            final String? signature;
            PaymentSuccessResponse({this.orderId, this.paymentId, this.signature});
          }

          class PaymentFailureResponse {
            final int? code;
            final String? message;
            PaymentFailureResponse({this.code, this.message});
          }

          class ExternalWalletResponse {
            final String? walletName;
            ExternalWalletResponse({this.walletName});
          }

          class RazorpayCheckoutService {
            Function(PaymentSuccessResponse)? onSuccess;
            Function(PaymentFailureResponse)? onFailure;
            Function(ExternalWalletResponse)? onExternalWallet;

            void openCheckout({
              required String key,
              required String orderId,
              required num amount,
              required String currency,
              required String name,
              required String description,
              String? userEmail,
              String? userPhone,
            }) {
              onFailure?.call(PaymentFailureResponse(
                code: 0,
                message: 'Payment gateway is currently in testing mode.',
              ));
            }

            void dispose() {}
          }
          ''')
          PY

          flutter create --platforms=android .

          # --- AGP 9 + compileSdk 36 patch ---
          python3 - <<'PY'
          from pathlib import Path
          import re
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text()
          if 'android.permission.INTERNET' not in text:
              text = text.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">', '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET"/>')
          if 'android.permission.CAMERA' not in text:
              text = text.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">', '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.CAMERA"/>')
          if 'android.permission.READ_MEDIA_IMAGES' not in text:
              text = text.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">', '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>')
          manifest.write_text(text)

          # Patch settings.gradle to force AGP 8.x if possible (fallback)
          for sp in [Path('android/settings.gradle'), Path('android/settings.gradle.kts')]:
              if sp.exists():
                  s = sp.read_text()
                  # no force here, keep default
                  sp.write_text(s)

          gradle = Path('android/app/build.gradle.kts') if Path('android/app/build.gradle.kts').exists() else Path('android/app/build.gradle')
          if gradle.exists():
              g = gradle.read_text()
              print('=== BEFORE PATCH (first 80 lines) ===')
              print('\n'.join(g.splitlines()[:80]))
              
              # Remove kotlin-android plugin (AGP 9 built-in kotlin)
              g = re.sub(r'\s*id\s*\(\s*["\']kotlin-android["\']\s*\)\s*\n?', '\n', g)
              g = re.sub(r'\s*kotlin\s*\(\s*["\']android["\']\s*\)\s*\n?', '\n', g)
              g = re.sub(r'id\s*\(\s*["\']org\.jetbrains\.kotlin\.android["\']\s*\)', '', g)

              # compileSdk / targetSdk / minSdk -> 36 / 36 / 23
              g = g.replace('compileSdk = flutter.compileSdkVersion', 'compileSdk = 36')
              g = re.sub(r'compileSdk\s*=\s*flutter\.compileSdkVersion', 'compileSdk = 36', g)
              g = re.sub(r'compileSdkVersion\s+[0-9]+', 'compileSdkVersion 36', g)
              g = re.sub(r'compileSdkVersion\s*=?\s*flutter\.compileSdkVersion', 'compileSdkVersion 36', g)
              g = g.replace('targetSdk = flutter.targetSdkVersion', 'targetSdk = 36')
              g = re.sub(r'targetSdk\s*=\s*flutter\.targetSdkVersion', 'targetSdk = 36', g)
              g = re.sub(r'targetSdkVersion\s+[0-9]+', 'targetSdkVersion 36', g)
              g = g.replace('minSdk = flutter.minSdkVersion', 'minSdk = 23')
              g = re.sub(r'minSdk\s*=\s*flutter\.minSdkVersion', 'minSdk = 23', g)

              # Java 17
              g = g.replace('JavaVersion.VERSION_1_8', 'JavaVersion.VERSION_17')
              g = g.replace('JavaVersion.VERSION_11', 'JavaVersion.VERSION_17')
              g = g.replace('JavaVersion.VERSION_21', 'JavaVersion.VERSION_17')

              # Remove old kotlinOptions block entirely (AGP 9 incompatible)
              # match kotlinOptions { ... } non-greedy, DOTALL
              g = re.sub(r'\nkotlinOptions\s*\{.*?\}\s*\n', '\n', g, flags=re.DOTALL)

              # Ensure compileOptions exists and is Java 17 + desugaring
              if 'compileOptions {' in g:
                  # make sure desugaring flag inside
                  if 'isCoreLibraryDesugaringEnabled' not in g:
                      g = g.replace('compileOptions {', 'compileOptions {\n        isCoreLibraryDesugaringEnabled = true', 1)
              else:
                  # insert compileOptions after compileSdk line
                  g = re.sub(r'(compileSdk\s*=\s*36)', r'\1\n\n    compileOptions {\n        sourceCompatibility = JavaVersion.VERSION_17\n        targetCompatibility = JavaVersion.VERSION_17\n        isCoreLibraryDesugaringEnabled = true\n    }', g, count=1)

              # coreLibraryDesugaring dependency
              if 'coreLibraryDesugaring(' not in g:
                  if 'dependencies {' in g:
                      g = g.replace('dependencies {', 'dependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")', 1)
                  else:
                      g += '\n\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")\n}\n'

              # ADD AGP 9 kotlin compilerOptions block at end if not present
              if 'kotlin {' not in g or 'compilerOptions' not in g:
                  g += "\n\n// AGP 9 Kotlin built-in migration\nkotlin {\n    compilerOptions {\n        jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17)\n    }\n}\n"
              print('=== AFTER PATCH (first 120 lines) ===')
              print('\n'.join(g.splitlines()[:120]))
              gradle.write_text(g)
          PY

          flutter clean
          flutter pub get

          echo "Patching qr_code_scanner Android namespace + compileSdk 36..."
          python3 - <<'PY'
          from pathlib import Path
          import glob, re
          files = glob.glob(str(Path.home() / '.pub-cache/hosted/pub.dev/qr_code_scanner-*/android/build.gradle'))
          files += glob.glob(str(Path.home() / '.pub-cache/hosted/pub.dev/qr_code_scanner-*/**/build.gradle'), recursive=True)
          seen=set()
          for file in files:
              if file in seen: continue
              seen.add(file)
              p=Path(file)
              try: txt=p.read_text()
              except: continue
              orig=txt
              if 'android {' in txt and 'namespace ' not in txt:
                  txt=txt.replace('android {','android {\n    namespace "net.touchcapture.qr.flutterqr"',1)
              txt=re.sub(r'compileSdkVersion\s+[0-9]+','compileSdkVersion 36',txt)
              txt=re.sub(r'targetSdkVersion\s+[0-9]+','targetSdkVersion 36',txt)
              txt=txt.replace('JavaVersion.VERSION_1_8','JavaVersion.VERSION_17').replace('JavaVersion.VERSION_11','JavaVersion.VERSION_17').replace('JavaVersion.VERSION_1_7','JavaVersion.VERSION_17')
              txt=re.sub(r'jvmTarget\s*=\s*["\']?(?:1\.8|11|17)["\']?','jvmTarget = "17"',txt)
              # remove kotlinOptions if present? keep simple for plugin (Groovy) – AGP9 issue mainly app module
              if txt!=orig:
                  p.write_text(txt); print('Patched',p)
          print('scanner files',len(seen))
          PY

          flutter build apk --release
    artifacts:
      - project/global_exchanger_flutter/build/app/outputs/flutter-apk/app-release.apk
  