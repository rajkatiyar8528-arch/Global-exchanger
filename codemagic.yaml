workflows:
  android-apk:
    name: Global Exchanger Android APK - QR Production v8
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Unzip, patch production app, and Build APK
        script: |
          set -e
          echo "=== Global Exchanger QR Production v8 ==="
          unzip -o global_exchanger_project.zip -d project
          cd project/global_exchanger_flutter

          python3 - <<'PY'
          from pathlib import Path

          pubspec = Path('pubspec.yaml')
          text = pubspec.read_text()
          # KEEP razorpay_flutter for Option B - do NOT strip
          # text = '\n'.join([line for line in text.splitlines() if 'razorpay_flutter:' not in line]) + '\n'
          # pubspec.write_text(text)

          main = Path('lib/main.dart')
          m = main.read_text()
          # DO NOT remove razorpay import - Option B LIVE
          # m = m.replace("import 'package:razorpay_flutter/razorpay_flutter.dart';\n", "")
          m = m.replace("ListView(children: const [", "ListView(children: [")
          m = m.replace("child: const ListView(children: [", "child: ListView(children: [")
          m = m.replace("color: Color(0xFF111827)", "color: const Color(0xFF111827)")
          main.write_text(m)

          api = Path('lib/services/api_service.dart')
          a = api.read_text()
          a = a.replace("static const String baseUrl = 'http://10.0.2.2:5000';", "static const String baseUrl = 'https://global-exchanger.onrender.com';")
          a = a.replace("static const String baseUrl = 'http://localhost:5000';", "static const String baseUrl = 'https://global-exchanger.onrender.com';")
          api.write_text(a)

          # DO NOT overwrite razorpay_checkout_service.dart - keep REAL Razorpay for Option B
          print("Razorpay LIVE service kept as-is")
          PY

          flutter create --platforms=android .

          # --- AGP 9 + compileSdk 36 patch ---
          python3 - <<'PY'
          from pathlib import Path
          import re, sys
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text()
          if 'android.permission.INTERNET' not in text:
              text = text.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">', '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>\n    <uses-permission android:name="android.permission.VIBRATE"/>\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>')
          manifest.write_text(text)

          # gradle.properties - disable R8 full mode
          gp = Path('android/gradle.properties')
          if gp.exists():
              gpt = gp.read_text()
              if 'android.enableR8.fullMode' not in gpt:
                  gpt += "\nandroid.enableR8.fullMode=false\nandroid.useAndroidX=true\nandroid.enableJetifier=true\n"
                  gp.write_text(gpt)

          gradle = Path('android/app/build.gradle.kts')
          if not gradle.exists():
              gradle = Path('android/app/build.gradle')
          g = gradle.read_text()

          # 1. Remove kotlin-android plugin AGP9
          g = re.sub(r'\s*id\s*\(\s*["\']kotlin-android["\']\s*\)', '', g)
          g = re.sub(r'\s*kotlin\s*\(\s*["\']android["\']\s*\)', '', g)
          g = re.sub(r'id\s*\(\s*["\']org\.jetbrains\.kotlin\.android["\']\s*\)', '', g)

          # 2. SDK 36
          g = re.sub(r'compileSdk\s*=\s*flutter\.compileSdkVersion', 'compileSdk = 36', g)
          g = g.replace('compileSdk = flutter.compileSdkVersion', 'compileSdk = 36')
          g = re.sub(r'compileSdkVersion\s+[0-9]+', 'compileSdkVersion 36', g)
          g = re.sub(r'targetSdk\s*=\s*flutter\.targetSdkVersion', 'targetSdk = 36', g)
          g = re.sub(r'targetSdkVersion\s+[0-9]+', 'targetSdkVersion 36', g)
          g = re.sub(r'minSdk\s*=\s*flutter\.minSdkVersion', 'minSdk = 23', g)

          # 3. Java 17
          g = g.replace('JavaVersion.VERSION_1_8', 'JavaVersion.VERSION_17').replace('JavaVersion.VERSION_11', 'JavaVersion.VERSION_17').replace('JavaVersion.VERSION_21', 'JavaVersion.VERSION_17')
          g = re.sub(r'jvmTarget\s*=\s*["\'](?:1\.8|11)["\']', 'jvmTarget = "17"', g)
          g = re.sub(r'jvmTarget\s*=\s*JavaVersion\.VERSION_[0-9_]+(?:\.toString\(\))?', 'jvmTarget = "17"', g)

          # 4. Remove kotlinOptions (AGP9 incompatible)
          g = re.sub(r'\s*kotlinOptions\s*\{[^}]*\}', '', g, flags=re.DOTALL)

          # 5. FORCE fresh compileOptions with desugaring
          g = re.sub(r'compileOptions\s*\{[^}]*\}', '', g, flags=re.DOTALL)
          # insert after compileSdk
          if 'compileSdk = 36' in g:
              g = g.replace('compileSdk = 36', 'compileSdk = 36\n\n    compileOptions {\n        sourceCompatibility = JavaVersion.VERSION_17\n        targetCompatibility = JavaVersion.VERSION_17\n        isCoreLibraryDesugaringEnabled = true\n    }', 1)
          elif 'compileSdkVersion 36' in g:
              g = g.replace('compileSdkVersion 36', 'compileSdkVersion 36\n    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_17\n        targetCompatibility JavaVersion.VERSION_17\n        coreLibraryDesugaringEnabled true\n    }', 1)

          # 6. Force minify OFF - Kotlin DSL ONLY
          g = re.sub(r'isMinifyEnabled\s*=\s*\w+', '', g)
          g = re.sub(r'minifyEnabled\s+\w+', '', g)
          g = re.sub(r'isShrinkResources\s*=\s*\w+', '', g)
          g = re.sub(r'shrinkResources\s+\w+', '', g)
          # Inject into release
          if 'getByName("release")' in g:
              g = g.replace('getByName("release") {', 'getByName("release") {\n            isMinifyEnabled = false\n            isShrinkResources = false\n')
          elif 'release {' in g:
              g = g.replace('release {', 'release {\n            isMinifyEnabled = false\n            isShrinkResources = false\n', 1)

          # 7. Kotlin compilerOptions AGP9
          if 'kotlin {' not in g or 'compilerOptions' not in g:
              g += "\n\nkotlin {\n    compilerOptions {\n        jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17)\n    }\n}\n"

          # Write intermediate
          gradle.write_text(g)

          # 8. FORCE append coreLibraryDesugaring dependency - GUARANTEES config not empty
          with open(gradle, 'a', encoding='utf-8') as f:
              f.write("""
// === Global Exchanger FORCED DESUGAR v8 ===
// fixes: coreLibraryDesugaring configuration contains no dependencies
dependencies {
    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")
}
""")
          print("=== PATCH COMPLETE ===")
          final = open(gradle, encoding='utf-8').read()
          # Verify
          checks = [
            ("compileSdk = 36" in final or "compileSdkVersion 36" in final, "compileSdk 36"),
            ("isCoreLibraryDesugaringEnabled = true" in final or "coreLibraryDesugaringEnabled true" in final, "desugaring ON"),
            ("coreLibraryDesugaring" in final and "desugar_jdk_libs" in final, "desugar dep"),
            ("isMinifyEnabled = false" in final, "minify OFF"),
            ("jvmTarget" in final and "17" in final, "jvm17"),
            ("kotlin {" in final and "compilerOptions" in final, "kotlin compilerOptions"),
          ]
          failed=False
          for ok,name in checks:
              print(("✅" if ok else "❌")+" "+name)
              if not ok: failed=True
          if failed:
              print(final[-1500:])
              sys.exit(1)
          PY

          flutter clean
          flutter pub get

          # Patch qr_code_scanner
          python3 - <<'PY'
          from pathlib import Path
          import glob, re
          files = set(glob.glob(str(Path.home() / '.pub-cache/hosted/pub.dev/qr_code_scanner-*/android/build.gradle')) + glob.glob(str(Path.home() / '.pub-cache/hosted/pub.dev/qr_code_scanner-*/**/build.gradle'), recursive=True))
          print(f"Patching {len(files)} qr_code_scanner files")
          for fp in files:
              p=Path(fp)
              try: txt=p.read_text()
              except: continue
              orig=txt
              if 'android {' in txt and 'namespace ' not in txt:
                  txt = txt.replace('android {', 'android {\n    namespace "net.touchcapture.qr.flutterqr"', 1)
              txt = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 36', txt)
              txt = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 36', txt)
              txt = txt.replace('JavaVersion.VERSION_1_8','JavaVersion.VERSION_17').replace('JavaVersion.VERSION_11','JavaVersion.VERSION_17')
              txt = re.sub(r'jvmTarget\s*=\s*["\']?(?:1\.8|11)["\']?', 'jvmTarget = "17"', txt)
              # strip kotlinOptions to avoid AGP9 crash in plugin too
              txt = re.sub(r'\s*kotlinOptions\s*\{[^}]*\}', '', txt, flags=re.DOTALL)
              if txt != orig:
                  p.write_text(txt)
                  print("patched", p)
          PY

          echo "=== BUILD APK v8 - Razorpay LIVE + QR Pro base ==="
          flutter build apk --release --no-shrink --verbose
    artifacts:
      - project/global_exchanger_flutter/build/app/outputs/flutter-apk/app-release.apk
      - project/global_exchanger_flutter/build/app/outputs/**/mapping.txt