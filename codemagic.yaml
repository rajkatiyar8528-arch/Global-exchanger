workflows:
  android-apk:
    name: Global Exchanger Android APK - QR Production v9 - Razorpay LIVE
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Unzip, patch production app, and Build APK
        script: |
          set -e
          echo "=== Global Exchanger v9 - QR + Razorpay LIVE ==="
          unzip -o global_exchanger_project.zip -d project
          cd project/global_exchanger_flutter
          python3 - << 'PY'
          from pathlib import Path
          main = Path('lib/main.dart')
          m = main.read_text()
          m = m.replace('ListView(children: const [', 'ListView(children: [')
          m = m.replace('child: const ListView(children: [', 'child: ListView(children: [')
          m = m.replace('color: Color(0xFF111827)', 'color: const Color(0xFF111827)')
          main.write_text(m)
          api = Path('lib/services/api_service.dart')
          a = api.read_text()
          a = a.replace("static const String baseUrl = 'http://10.0.2.2:5000';", "static const String baseUrl = 'https://global-exchanger.onrender.com';")
          a = a.replace("static const String baseUrl = 'http://localhost:5000';", "static const String baseUrl = 'https://global-exchanger.onrender.com';")
          api.write_text(a)
          print("patched main + api - razorpay KEPT LIVE")
          PY
          flutter create --platforms=android .
          python3 - << 'PY'
          from pathlib import Path
          import re, sys
          mf = Path('android/app/src/main/AndroidManifest.xml')
          mt = mf.read_text()
          for perm in ['android.permission.INTERNET','android.permission.CAMERA','android.permission.READ_MEDIA_IMAGES','android.permission.READ_EXTERNAL_STORAGE','android.permission.VIBRATE','android.permission.POST_NOTIFICATIONS','android.permission.USE_BIOMETRIC','android.permission.USE_FINGERPRINT']:
              if perm not in mt:
                  ins = f'<uses-permission android:name="{perm}"' + (' android:maxSdkVersion="32"/>' if 'READ_EXTERNAL_STORAGE' in perm else '/>')
                  mt = mt.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">', '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    ' + ins, 1)
          mf.write_text(mt)
          # local_auth (biometric login) requires the launcher Activity to
          # extend FlutterFragmentActivity instead of the default
          # FlutterActivity — patch whichever MainActivity file `flutter
          # create` generated (Kotlin is the default for new projects).
          main_activity_patched = False
          for main_activity_path in ['android/app/src/main/kotlin/**/MainActivity.kt', 'android/app/src/main/java/**/MainActivity.java']:
              for p in Path('.').glob(main_activity_path):
                  t = p.read_text()
                  if 'FlutterFragmentActivity' in t:
                      main_activity_patched = True
                  elif 'FlutterActivity' in t:
                      if p.suffix == '.kt':
                          t = t.replace('import io.flutter.embedding.android.FlutterActivity', 'import io.flutter.embedding.android.FlutterFragmentActivity')
                          t = t.replace(': FlutterActivity()', ': FlutterFragmentActivity()')
                      else:
                          t = t.replace('import io.flutter.embedding.android.FlutterActivity;', 'import io.flutter.embedding.android.FlutterFragmentActivity;')
                          t = t.replace('extends FlutterActivity', 'extends FlutterFragmentActivity')
                      if 'FlutterFragmentActivity' in t:
                          p.write_text(t)
                          main_activity_patched = True
                          print(f"Patched {p} to use FlutterFragmentActivity (for local_auth biometrics)")
          # FAIL LOUDLY (rather than silently shipping a broken biometric
          # feature) if the patch didn't take — e.g. because a future
          # Flutter version changes the generated MainActivity's exact
          # text/package layout in a way these string replacements don't
          # anticipate. Better to see a red failed build in Codemagic than
          # a working-looking APK where biometric login mysteriously
          # crashes for every user after install.
          assert main_activity_patched, "FAILED to patch MainActivity to extend FlutterFragmentActivity — local_auth biometrics will not work. Check the generated MainActivity file's exact contents."
          gp = Path('android/gradle.properties')
          if gp.exists():
              t = gp.read_text()
              if 'android.enableR8.fullMode' not in t:
                  open(gp, 'a').write('\nandroid.enableR8.fullMode=false\nandroid.useAndroidX=true\nandroid.enableJetifier=true\n')
          gradle_path = Path('android/app/build.gradle.kts')
          if not gradle_path.exists():
              gradle_path = Path('android/app/build.gradle')
          g = gradle_path.read_text()
          # AGP9 - remove kotlin-android plugin
          g = re.sub(r'\s*id\s*\(\s*["\']kotlin-android["\']\s*\)', '', g)
          g = re.sub(r'\s*kotlin\s*\(\s*["\']android["\']\s*\)', '', g)
          g = re.sub(r'id\s*\(\s*["\']org\.jetbrains\.kotlin\.android["\']\s*\)', '', g)
          # SDK 36
          g = re.sub(r'compileSdk\s*=\s*flutter\.compileSdkVersion', 'compileSdk = 36', g)
          g = g.replace('compileSdk = flutter.compileSdkVersion', 'compileSdk = 36')
          g = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 36', g)
          g = re.sub(r'targetSdk\s*=\s*flutter\.targetSdkVersion', 'targetSdk = 36', g)
          g = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 36', g)
          g = re.sub(r'minSdk\s*=\s*flutter\.minSdkVersion', 'minSdk = 23', g)
          # Java 17
          g = g.replace('JavaVersion.VERSION_1_8', 'JavaVersion.VERSION_17').replace('JavaVersion.VERSION_11', 'JavaVersion.VERSION_17').replace('JavaVersion.VERSION_21', 'JavaVersion.VERSION_17')
          g = re.sub(r'jvmTarget\s*=\s*["\'](?:1\.8|11)["\']', 'jvmTarget = "17"', g)
          # remove kotlinOptions
          g = re.sub(r'\s*kotlinOptions\s*\{[^}]*\}', '', g, flags=re.DOTALL)
          # compileOptions clean
          g = re.sub(r'compileOptions\s*\{[^}]*\}', '', g, flags=re.DOTALL)
          if 'compileSdk = 36' in g:
              g = g.replace('compileSdk = 36', 'compileSdk = 36\n\n    compileOptions {\n        sourceCompatibility = JavaVersion.VERSION_17\n        targetCompatibility = JavaVersion.VERSION_17\n        isCoreLibraryDesugaringEnabled = true\n    }', 1)
          # minify OFF
          g = re.sub(r'isMinifyEnabled\s*=\s*\w+', '', g)
          g = re.sub(r'minifyEnabled\s+\w+', '', g)
          g = re.sub(r'isShrinkResources\s*=\s*\w+', '', g)
          g = re.sub(r'shrinkResources\s+\w+', '', g)
          if 'getByName("release")' in g:
              g = g.replace('getByName("release") {', 'getByName("release") {\n            isMinifyEnabled = false\n            isShrinkResources = false\n')
          elif 'release {' in g:
              g = g.replace('release {', 'release {\n            isMinifyEnabled = false\n            isShrinkResources = false\n', 1)
          # kotlin compilerOptions
          if 'kotlin {' not in g or 'compilerOptions' not in g:
              g += "\n\nkotlin {\n    compilerOptions {\n        jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17)\n    }\n}\n"
          gradle_path.write_text(g)
          # FORCE desugar dep
          with open(gradle_path, 'a', encoding='utf-8') as f:
              f.write("\n\n// Global Exchanger forced desugar v9\ndependencies {\n    coreLibraryDesugaring(\"com.android.tools:desugar_jdk_libs:2.0.4\")\n}\n")
          # ---- Firebase Cloud Messaging (push notifications) wiring ----
          # This is OPTIONAL and SAFE-BY-DEFAULT: until the user actually
          # creates a Firebase project and uploads google-services.json
          # to the GitHub repo ROOT (same folder as codemagic.yaml and
          # global_exchanger_project.zip), this whole block is skipped and
          # the app builds exactly as before (Firebase.initializeApp() in
          # push_service.dart will simply fail gracefully at runtime and
          # push stays disabled, in-app notifications keep working fine).
          # cwd here is project/global_exchanger_flutter, so the repo root
          # (where Codemagic checks out the git repo) is two levels up.
          repo_root_candidates = [Path('../../google-services.json'), Path('../../../google-services.json'), Path.home() / 'clone' / 'google-services.json']
          gsj_src = None
          for c in repo_root_candidates:
              if c.exists():
                  gsj_src = c
                  break
          if gsj_src is not None:
              print('Found google-services.json at ' + str(gsj_src) + ' - wiring up Firebase')
              Path('android/app').mkdir(parents=True, exist_ok=True)
              Path('android/app/google-services.json').write_text(gsj_src.read_text())
              nl = chr(10)
              # Prefer the MODERN Gradle plugin-management style (plugin
              # version declared once in settings.gradle(.kts), then applied
              # WITHOUT a version in app/build.gradle(.kts)) since this is
              # what current `flutter create` templates use. Only fall back
              # to the OLD buildscript-classpath style if no settings.gradle
              # file exists at all (very old project layout) - mixing BOTH
              # styles for the same plugin in the same project can cause
              # Gradle "duplicate plugin" / version-resolution conflicts, so
              # exactly one of these two branches should ever run.
              settings_kts = Path('android/settings.gradle.kts')
              settings_groovy = Path('android/settings.gradle')
              settings_file = settings_kts if settings_kts.exists() else settings_groovy
              used_settings_style = False
              if settings_file.exists():
                  sg = settings_file.read_text()
                  if 'com.google.gms.google-services' not in sg:
                      if settings_file.suffix == '.kts':
                          if 'plugins {' in sg:
                              sg = sg.replace('plugins {', 'plugins {' + nl + '    id("com.google.gms.google-services") version "4.4.2" apply false', 1)
                              used_settings_style = True
                      else:
                          if 'plugins {' in sg:
                              sg = sg.replace('plugins {', "plugins {" + nl + "    id 'com.google.gms.google-services' version '4.4.2' apply false", 1)
                              used_settings_style = True
                      if used_settings_style:
                          settings_file.write_text(sg)
                  else:
                      used_settings_style = True  # already declared there from a previous run
              if not used_settings_style:
                  # Fallback: old buildscript-classpath style on the root build file.
                  gservices_classpath_kts = 'classpath("com.google.gms:google-services:4.4.2")'
                  gservices_classpath_groovy = "classpath 'com.google.gms:google-services:4.4.2'"
                  root_gradle_kts = Path('android/build.gradle.kts')
                  root_gradle_groovy = Path('android/build.gradle')
                  root_gradle = root_gradle_kts if root_gradle_kts.exists() else root_gradle_groovy
                  if root_gradle.exists():
                      rg = root_gradle.read_text()
                      if 'google-services' not in rg:
                          if root_gradle.suffix == '.kts':
                              if 'dependencies {' in rg:
                                  rg = rg.replace('dependencies {', 'dependencies {' + nl + '        ' + gservices_classpath_kts, 1)
                              else:
                                  rg += nl + 'buildscript {' + nl + '    repositories { google(); mavenCentral() }' + nl + '    dependencies { ' + gservices_classpath_kts + ' }' + nl + '}' + nl
                          else:
                              if 'dependencies {' in rg:
                                  rg = rg.replace('dependencies {', 'dependencies {' + nl + '        ' + gservices_classpath_groovy, 1)
                              else:
                                  rg += nl + 'buildscript {' + nl + '    repositories { google(); mavenCentral() }' + nl + '    dependencies { ' + gservices_classpath_groovy + ' }' + nl + '}' + nl
                          root_gradle.write_text(rg)
              # App-level build file needs the plugin actually applied - this
              # id() works whether the version came from settings.gradle
              # (modern style) or from the root buildscript classpath
              # (old style, where an unversioned id() in the app's own
              # plugins{} block still resolves fine against that classpath).
              app_gradle = gradle_path  # already resolved above (build.gradle.kts or build.gradle)
              ag = app_gradle.read_text()
              if 'com.google.gms.google-services' not in ag:
                  if app_gradle.suffix == '.kts':
                      if 'plugins {' in ag:
                          ag = ag.replace('plugins {', 'plugins {' + nl + '    id("com.google.gms.google-services")', 1)
                      else:
                          ag = 'plugins {' + nl + '    id("com.google.gms.google-services")' + nl + '}' + nl + ag
                  else:
                      if 'plugins {' in ag:
                          ag = ag.replace('plugins {', "plugins {" + nl + "    id 'com.google.gms.google-services'", 1)
                      else:
                          ag = "plugins {" + nl + "    id 'com.google.gms.google-services'" + nl + "}" + nl + ag
                  app_gradle.write_text(ag)
              # 3) firebase_messaging needs Firebase BoM-managed Android SDK deps
              #    pulled in automatically by the Flutter plugin itself, so no
              #    extra implementation lines are needed here - the plugin
              #    registration above is the only Gradle wiring required.
              print('Firebase google-services.json wired into Android build - push notifications ACTIVE')
          else:
              print('No google-services.json found at repo root - building WITHOUT Firebase (push notifications stay disabled, rest of app works normally). See PUSH_NOTIFICATIONS_SETUP_GUIDE.md to activate.')
          # proguard
          Path('android/app/proguard-rules.pro').write_text("-keep class com.google.mlkit.** { *; }\n-dontwarn com.google.mlkit.**\n-keep class com.google.android.gms.** { *; }\n-dontwarn com.google.android.gms.**\n-keep class com.razorpay.** { *; }\n-dontwarn com.razorpay.**\n-keep class net.touchcapture.qr.** { *; }\n-keepattributes *Annotation*,Signature,Exceptions,InnerClasses,EnclosingMethod\n-dontobfuscate\n-dontoptimize\n-dontshrink\n")
          # verify
          final = open(gradle_path, encoding='utf-8').read()
          assert 'compileSdk = 36' in final or 'compileSdkVersion 36' in final
          assert 'isCoreLibraryDesugaringEnabled = true' in final
          assert 'coreLibraryDesugaring' in final
          assert 'isMinifyEnabled = false' in final
          print("Gradle v9 OK - Razorpay LIVE")
          PY
          flutter clean
          flutter pub get
          # qr_code_scanner patch
          python3 - << 'PY'
          from pathlib import Path
          import glob, re
          files = set(glob.glob(str(Path.home() / '.pub-cache/hosted/pub.dev/qr_code_scanner-*/android/build.gradle')) + glob.glob(str(Path.home() / '.pub-cache/hosted/pub.dev/qr_code_scanner-*/**/build.gradle'), recursive=True))
          for fp in files:
              p = Path(fp)
              try: txt = p.read_text()
              except: continue
              orig = txt
              if 'android {' in txt and 'namespace ' not in txt:
                  txt = txt.replace('android {', 'android {\n    namespace "net.touchcapture.qr.flutterqr"', 1)
              txt = re.sub(r'compileSdkVersion\s+\d+', 'compileSdkVersion 36', txt)
              txt = re.sub(r'targetSdkVersion\s+\d+', 'targetSdkVersion 36', txt)
              txt = txt.replace('JavaVersion.VERSION_1_8', 'JavaVersion.VERSION_17').replace('JavaVersion.VERSION_11', 'JavaVersion.VERSION_17')
              txt = re.sub(r'jvmTarget\s*=\s*["\']?(?:1\.8|11)["\']?', 'jvmTarget = "17"', txt)
              txt = re.sub(r'\s*kotlinOptions\s*\{[^}]*\}', '', txt, flags=re.DOTALL)
              if txt != orig:
                  p.write_text(txt)
          print("qr patch done", len(files))
          PY
          flutter build apk --release --no-shrink
    artifacts:
      - project/global_exchanger_flutter/build/app/outputs/flutter-apk/app-release.apk
