workflows:
  android-apk:
    name: Global Exchanger Android APK - QR Production
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Unzip, patch production app, and Build APK
        script: |
          set -e
          unzip -o global_exchanger_project.zip -d project
          cd project/global_exchanger_flutter

          python3 - <<'PY'
          from pathlib import Path

          pubspec = Path('pubspec.yaml')
          text = pubspec.read_text()
          text = '\n'.join([line for line in text.splitlines() if 'razorpay_flutter:' not in line]) + '\n'
          pubspec.write_text(text)

          main = Path('lib/main.dart')
          m = main.read_text()
          m = m.replace("import 'package:razorpay_flutter/razorpay_flutter.dart';\n", "")
          m = m.replace("ListView(children: const [", "ListView(children: [")
          m = m.replace("child: const ListView(children: [", "child: ListView(children: [")
          m = m.replace("color: Color(0xFF111827)", "color: const Color(0xFF111827)")
          main.write_text(m)

          api = Path('lib/services/api_service.dart')
          a = api.read_text()
          a = a.replace("static const String baseUrl = 'http://10.0.2.2:5000';", "static const String baseUrl = 'https://global-exchanger.onrender.com';")
          a = a.replace("static const String baseUrl = 'http://localhost:5000';", "static const String baseUrl = 'https://global-exchanger.onrender.com';")
          api.write_text(a)

          service = Path('lib/services/razorpay_checkout_service.dart')
          service.write_text(r'''
          class PaymentSuccessResponse {
            final String? orderId;
            final String? paymentId;
            final String? signature;
            PaymentSuccessResponse({this.orderId, this.paymentId, this.signature});
          }

          class PaymentFailureResponse {
            final int? code;
            final String? message;
            PaymentFailureResponse({this.code, this.message});
          }

          class ExternalWalletResponse {
            final String? walletName;
            ExternalWalletResponse({this.walletName});
          }

          class RazorpayCheckoutService {
            Function(PaymentSuccessResponse)? onSuccess;
            Function(PaymentFailureResponse)? onFailure;
            Function(ExternalWalletResponse)? onExternalWallet;

            void openCheckout({
              required String key,
              required String orderId,
              required num amount,
              required String currency,
              required String name,
              required String description,
              String? userEmail,
              String? userPhone,
            }) {
              onFailure?.call(PaymentFailureResponse(
                code: 0,
                message: 'Payment gateway is currently in testing mode.',
              ));
            }

            void dispose() {}
          }
          ''')
          PY

          flutter create --platforms=android .

          python3 - <<'PY'
          from pathlib import Path

          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text()

          if 'android.permission.INTERNET' not in text:
              text = text.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET"/>'
              )

          if 'android.permission.CAMERA' not in text:
              text = text.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.CAMERA"/>'
              )

          if 'android.permission.READ_MEDIA_IMAGES' not in text:
              text = text.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>'
              )

          manifest.write_text(text)

          gradle = Path('android/app/build.gradle.kts')
          if gradle.exists():
              g = gradle.read_text()

              g = g.replace('minSdk = flutter.minSdkVersion', 'minSdk = 23')

              # Enable Java 8+ core library desugaring required by QR scanner.
              if 'isCoreLibraryDesugaringEnabled' not in g:
                  if 'compileOptions {' in g:
                      g = g.replace(
                          'compileOptions {',
                          'compileOptions {\n        isCoreLibraryDesugaringEnabled = true',
                          1
                      )
                  else:
                      g = g.replace(
                          'android {',
                          'android {\n    compileOptions {\n        isCoreLibraryDesugaringEnabled = true\n        sourceCompatibility = JavaVersion.VERSION_17\n        targetCompatibility = JavaVersion.VERSION_17\n    }',
                          1
                      )

              if 'coreLibraryDesugaring(' not in g:
                  if 'dependencies {' in g:
                      g = g.replace(
                          'dependencies {',
                          'dependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")',
                          1
                      )
                  else:
                      g += '\n\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")\n}\n'

              gradle.write_text(g)
          PY

          flutter clean
          flutter pub get

          echo "Patching qr_code_scanner Android namespace and JVM target..."
          python3 - <<'PY'
          from pathlib import Path
          import glob

          files = glob.glob(str(Path.home() / '.pub-cache/hosted/pub.dev/qr_code_scanner-*/android/build.gradle'))
          files += glob.glob(str(Path.home() / '.pub-cache/hosted/pub.dev/qr_code_scanner-*/**/android/build.gradle'), recursive=True)

          seen = set()

          for file in files:
              if file in seen:
                  continue

              seen.add(file)
              p = Path(file)
              txt = p.read_text()
              changed = False

              # Fix namespace issue
              if 'android {' in txt and 'namespace ' not in txt:
                  txt = txt.replace(
                      'android {',
                      'android {\n    namespace "net.touchcapture.qr.flutterqr"',
                      1
                  )
                  changed = True

              # Force Java/Kotlin target compatibility to 17
              replacements = {
                  'JavaVersion.VERSION_1_8': 'JavaVersion.VERSION_17',
                  'JavaVersion.VERSION_1_7': 'JavaVersion.VERSION_17',
                  'sourceCompatibility 1.8': 'sourceCompatibility JavaVersion.VERSION_17',
                  'targetCompatibility 1.8': 'targetCompatibility JavaVersion.VERSION_17',
                  'sourceCompatibility = 1.8': 'sourceCompatibility = JavaVersion.VERSION_17',
                  'targetCompatibility = 1.8': 'targetCompatibility = JavaVersion.VERSION_17',
                  'jvmTarget = "1.8"': 'jvmTarget = "17"',
                  "jvmTarget = '1.8'": "jvmTarget = '17'",
              }

              for old, new in replacements.items():
                  if old in txt:
                      txt = txt.replace(old, new)
                      changed = True

              if 'android {' in txt and 'compileOptions {' not in txt:
                  txt = txt.replace(
                      'android {',
                      'android {\n    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_17\n        targetCompatibility JavaVersion.VERSION_17\n    }',
                      1
                  )
                  changed = True

              if 'android {' in txt and 'kotlinOptions {' not in txt:
                  txt = txt.replace(
                      'android {',
                      'android {\n    kotlinOptions {\n        jvmTarget = "17"\n    }',
                      1
                  )
                  changed = True

              if 'tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile)' not in txt:
                  txt += '\n\ntasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {\n    kotlinOptions {\n        jvmTarget = "17"\n    }\n}\n'
                  changed = True

              if changed:
                  p.write_text(txt)
                  print('Patched qr_code_scanner gradle:', p)
              else:
                  print('No qr_code_scanner gradle patch needed:', p)

          if not seen:
              print('qr_code_scanner build.gradle not found')
          PY

          flutter build apk --release

    artifacts:
      - project/global_exchanger_flutter/build/app/outputs/flutter-apk/app-release.apk