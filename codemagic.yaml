workflows:
  android-apk:
    name: Global Exchanger Android APK - Production Clean
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Unzip, patch production clean app, and Build APK
        script: |
          unzip -o global_exchanger_project.zip -d project
          cd project/global_exchanger_flutter

          python3 - <<'PY'
          from pathlib import Path

          # Remove Razorpay Flutter plugin for stable clean APK build.
          pubspec = Path('pubspec.yaml')
          text = pubspec.read_text()
          text = '\n'.join([line for line in text.splitlines() if 'razorpay_flutter:' not in line]) + '\n'
          pubspec.write_text(text)

          # Patch main.dart for production clean UI.
          main = Path('lib/main.dart')
          m = main.read_text()

          # Remove Razorpay package import.
          m = m.replace("import 'package:razorpay_flutter/razorpay_flutter.dart';\n", "")

          # Blank user login defaults.
          m = m.replace("final email = TextEditingController(text: 'test@example.com');", "final email = TextEditingController();")
          m = m.replace("final password = TextEditingController(text: 'Test@12345');", "final password = TextEditingController();")

          # Blank signup default password.
          m = m.replace("final password = TextEditingController(text: 'Test@12345');", "final password = TextEditingController();")

          # Blank admin defaults for security.
          m = m.replace("final email = TextEditingController(text: 'admin@globalexchanger.com');", "final email = TextEditingController();")
          m = m.replace("final password = TextEditingController(text: 'Admin@12345');", "final password = TextEditingController();")
          m = m.replace("final key = TextEditingController(text: 'GX-SUPER-KEY-2026');", "final key = TextEditingController();")

          # OTP production text.
          m = m.replace(
              "OTP sent to ${widget.email}. Development mode me OTP backend console/API response me milega.",
              "OTP aapke email par bheja gaya hai. Kripya inbox ya spam folder check karein."
          )
          m = m.replace(
              "Email par 6 digit OTP receive karke login karein.",
              "Apne email par aaya 6 digit OTP enter karke login karein."
          )

          # Fix const ListView compile issue.
          m = m.replace("child: const ListView(children: [", "child: ListView(children: const [")

          # Fix const color compile issue.
          m = m.replace("color: Color(0xFF111827)", "color: const Color(0xFF111827)")

          # Cleaner error messages.
          m = m.replace(
              "ScaffoldMessenger.of(context).showSnackBar(SnackBar(content: Text(e.toString())));",
              "ScaffoldMessenger.of(context).showSnackBar(const SnackBar(content: Text('Request failed. Please check details and try again.')));"
          )

          main.write_text(m)

          # Patch backend URL.
          api = Path('lib/services/api_service.dart')
          a = api.read_text()
          a = a.replace(
              "static const String baseUrl = 'http://10.0.2.2:5000';",
              "static const String baseUrl = 'https://global-exchanger.onrender.com';"
          )
          api.write_text(a)

          # Replace Razorpay service with a stable mock for now.
          service = Path('lib/services/razorpay_checkout_service.dart')
          service.write_text(r'''
          class PaymentSuccessResponse {
            final String? orderId;
            final String? paymentId;
            final String? signature;
            PaymentSuccessResponse({this.orderId, this.paymentId, this.signature});
          }

          class PaymentFailureResponse {
            final int? code;
            final String? message;
            PaymentFailureResponse({this.code, this.message});
          }

          class ExternalWalletResponse {
            final String? walletName;
            ExternalWalletResponse({this.walletName});
          }

          class RazorpayCheckoutService {
            Function(PaymentSuccessResponse)? onSuccess;
            Function(PaymentFailureResponse)? onFailure;
            Function(ExternalWalletResponse)? onExternalWallet;

            void openCheckout({
              required String key,
              required String orderId,
              required num amount,
              required String currency,
              required String name,
              required String description,
              String? userEmail,
              String? userPhone,
            }) {
              onFailure?.call(PaymentFailureResponse(
                code: 0,
                message: 'Payment gateway is currently in testing mode.',
              ));
            }

            void dispose() {}
          }
          ''')
          PY

          flutter create --platforms=android .

          # Add Internet permission.
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          text = manifest.read_text()
          if 'android.permission.INTERNET' not in text:
              text = text.replace(
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                  '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET"/>'
              )
          manifest.write_text(text)
          PY

          flutter clean
          flutter pub get
          flutter build apk --release

    artifacts:
      - project/global_exchanger_flutter/build/app/outputs/flutter-apk/app-release.apk
